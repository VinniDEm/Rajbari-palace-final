<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <!-- Crown -->
  <g stroke="#F5BD1F" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="60,170 90,90 130,140 150,70 170,140 210,90 240,170"/>
    <line x1="60" y1="170" x2="240" y2="170"/>
  </g>
  <!-- Dot under crown -->
  <circle cx="150" cy="150" r="6" fill="#F5BD1F"/>
  <!-- RAJBARI text -->
  <text x="150" y="215" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="40" font-weight="bold" fill="#F5BD1F" letter-spacing="4">RAJBARI</text>
  <!-- PALACE text -->
  <text x="150" y="255" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="38" font-weight="bold" fill="#F5BD1F" letter-spacing="5">PALACE</text>
</svg>
